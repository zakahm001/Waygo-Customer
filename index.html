<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waygo — Din Taxi</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:#eef1f8;color:#0d1b3e;min-height:100vh}
    .screen{display:none;min-height:100vh;flex-direction:column}
    .screen.active{display:flex}

    #sLoad{background:#0d1b3e;align-items:center;justify-content:center;gap:12px}
    .load-logo{font-size:64px;color:#fbbf24;animation:bounce 1s infinite}
    .load-name{color:#fbbf24;font-size:28px;font-weight:bold;letter-spacing:4px}
    .load-sub{color:#4a6090;font-size:13px}
    .dots{display:flex;gap:8px;margin-top:12px}
    .dot{width:10px;height:10px;background:#fbbf24;border-radius:50%;animation:dp 1.2s infinite}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes dp{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

    .topbar{background:#0d1b3e;padding:14px 20px;display:flex;align-items:center;
      justify-content:space-between;position:sticky;top:0;z-index:100;
      border-bottom:1px solid #1a2f5e}
    .tlogo{color:#fbbf24;font-size:18px;font-weight:bold;cursor:pointer}
    .topbar-right{display:flex;align-items:center;gap:8px}
    .tauth{color:#fbbf24;font-size:12px;cursor:pointer;background:#1a2f5e;
      padding:6px 12px;border-radius:8px;border:none;font-weight:700}
    .tlang{color:#4a6090;font-size:18px;cursor:pointer;background:none;border:none;padding:4px}

    .bnav{position:fixed;bottom:0;left:0;right:0;background:#0d1b3e;
      display:flex;justify-content:space-around;padding:10px 0;
      border-top:1px solid #1a2f5e;z-index:100}
    .bni{display:flex;flex-direction:column;align-items:center;gap:3px;
      color:#4a6090;font-size:10px;cursor:pointer;border:none;background:none}
    .bni.active{color:#fbbf24}
    .bni-icon{font-size:20px}
    .bspace{height:80px}

    .page{padding:20px;flex:1;overflow-y:auto}

    .card{background:white;border-radius:14px;padding:18px;margin-bottom:14px;
      border:1px solid #d0d7ea;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .stitle{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;
      letter-spacing:1.5px;margin-bottom:10px}

    .flabel{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;
      letter-spacing:1px;margin-bottom:5px;display:block}
    .finput{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #d0d7ea;
      background:#f8fafc;color:#0d1b3e;font-size:15px;outline:none;
      box-sizing:border-box;transition:border-color .2s;margin-bottom:14px}
    .finput:focus{border-color:#0d1b3e}
    .finput::placeholder{color:#94a3b8}
    select.finput{appearance:none}

    .dt-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}

    .prebook-badge{background:#dbeafe;border:1px solid #93c5fd;border-radius:10px;
      padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .prebook-badge-icon{font-size:20px}
    .prebook-badge-text{font-size:13px;color:#1a56db;font-weight:600}
    .prebook-badge-change{font-size:11px;color:#1a56db;text-decoration:underline;
      cursor:pointer;margin-left:auto;white-space:nowrap}

    .btn{padding:14px;border-radius:10px;font-size:15px;font-weight:700;
      border:none;cursor:pointer;width:100%;text-align:center;transition:opacity .2s}
    .btn:disabled{opacity:.6;cursor:default}
    .btn-primary{background:#0d1b3e;color:#fbbf24}
    .btn-success{background:#15803d;color:white}
    .btn-danger{background:#dc2626;color:white}
    .btn-teal{background:#0d9488;color:white}
    .btn-gray{background:#f1f5f9;color:#64748b}
    .btn-sm{padding:8px 14px;font-size:12px;width:auto;border-radius:8px}

    .badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
    .b-green{background:#dcfce7;color:#15803d;border:1px solid #86efac}
    .b-yellow{background:#fef3c7;color:#d97706;border:1px solid #fde68a}
    .b-red{background:#fee2e2;color:#dc2626;border:1px solid #fecaca}
    .b-gray{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0}
    .b-blue{background:#dbeafe;color:#1a56db;border:1px solid #93c5fd}
    .b-purple{background:#ede9fe;color:#7c3aed;border:1px solid #ddd6fe}

    .avatar{width:56px;height:56px;border-radius:50%;background:#0d1b3e;
      color:#fbbf24;display:flex;align-items:center;justify-content:center;
      font-size:22px;font-weight:bold;flex-shrink:0}

    .pgrid{display:grid;gap:8px;margin-bottom:14px}
    .pgrid-2{grid-template-columns:1fr 1fr}
    .pgrid-3{grid-template-columns:1fr 1fr 1fr}
    .pbtn{padding:12px 6px;border-radius:10px;border:2px solid #d0d7ea;
      background:white;color:#64748b;font-size:12px;font-weight:700;
      cursor:pointer;text-align:center;transition:all .15s}
    .pbtn.active{border-color:#0d1b3e;background:#0d1b3e;color:#fbbf24}

    .farebox{background:#f0f3f9;border-radius:10px;padding:14px;
      display:flex;justify-content:space-between;align-items:center;
      border:1px solid #d0d7ea;margin-bottom:14px}
    .fare-amt{font-size:24px;font-weight:bold;color:#0d1b3e}

    .mmap{background:#d4e8d4;border-radius:10px;height:130px;position:relative;
      overflow:hidden;margin-bottom:10px;border:1px solid #b8d4b8}
    .mmap-bg{position:absolute;inset:0;
      background-image:linear-gradient(#b8d4b8 1px,transparent 1px),
      linear-gradient(90deg,#b8d4b8 1px,transparent 1px);
      background-size:20px 20px;opacity:.5}
    .mroad-h{position:absolute;height:4px;background:white;left:0;right:0;opacity:.8}
    .mroad-v{position:absolute;width:4px;background:white;top:0;bottom:0;opacity:.8}
    .dmarker{position:absolute;width:30px;height:30px;border-radius:50%;
      background:#0d1b3e;border:3px solid #fbbf24;display:flex;align-items:center;
      justify-content:center;font-size:13px;transform:translate(-50%,-50%);
      transition:left 2s ease,top 2s ease;box-shadow:0 2px 8px rgba(0,0,0,.3)}
    .cmarker{position:absolute;width:22px;height:22px;border-radius:50%;
      background:#1a56db;border:3px solid white;display:flex;align-items:center;
      justify-content:center;font-size:10px;transform:translate(-50%,-50%)}
    .meta{position:absolute;top:6px;right:6px;background:#0d1b3e;color:#fbbf24;
      border-radius:6px;padding:3px 8px;font-size:10px;font-weight:bold}
    .mlive{position:absolute;bottom:6px;left:6px;background:rgba(255,255,255,.9);
      border-radius:6px;padding:2px 7px;font-size:10px;color:#0d1b3e;font-weight:bold}

    .stars{display:flex;gap:6px;justify-content:center;margin:8px 0}
    .star{font-size:28px;cursor:pointer;color:#d0d7ea;transition:color .15s}
    .star.active{color:#fbbf24}

    .moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
      z-index:200;align-items:flex-end;justify-content:center}
    .moverlay.open{display:flex}
    .mbox{background:white;border-radius:20px 20px 0 0;padding:24px 20px;
      width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
    .mtitle{font-size:17px;font-weight:bold;color:#0d1b3e;margin-bottom:16px}
    .minfo{background:#f0f3f9;border-radius:10px;padding:12px 14px;
      font-size:13px;color:#64748b;margin-bottom:14px;line-height:1.8}
    .minfo strong{color:#0d1b3e}
    .mbtns{display:flex;gap:10px}
    .mbtn{flex:1;padding:14px;border-radius:10px;font-size:14px;font-weight:bold;border:none;cursor:pointer}

    .auth-toggle{display:flex;background:#f0f3f9;border-radius:10px;padding:4px;margin-bottom:18px}
    .at-btn{flex:1;padding:10px;border:none;background:none;border-radius:8px;
      font-size:14px;font-weight:600;color:#64748b;cursor:pointer}
    .at-btn.active{background:white;color:#0d1b3e;box-shadow:0 1px 4px rgba(0,0,0,.1)}
    .type-toggle{display:flex;background:#f0f3f9;border-radius:10px;padding:4px;margin-bottom:14px}

    .chatbox{height:180px;overflow-y:auto;padding:8px 0;
      display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
    .cmsg{display:flex;gap:8px;align-items:flex-end}
    .cmsg.mine{flex-direction:row-reverse}
    .cav{width:26px;height:26px;border-radius:50%;background:#0d1b3e;color:#fbbf24;
      display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;flex-shrink:0}
    .cav.sup{background:#0d9488}
    .cbubble{max-width:72%;padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.4}
    .cmsg.mine .cbubble{background:#0d1b3e;color:#fbbf24;border-radius:12px 12px 4px 12px}
    .cmsg.other .cbubble{background:#f1f5f9;color:#0d1b3e;border-radius:12px 12px 12px 4px}
    .cinput-row{display:flex;gap:8px}
    .cinput{flex:1;padding:9px 12px;border-radius:24px;border:1px solid #d0d7ea;
      background:#f8fafc;font-size:13px;color:#0d1b3e;outline:none}
    .csend{width:38px;height:38px;border-radius:50%;background:#0d1b3e;
      border:none;color:#fbbf24;font-size:15px;cursor:pointer;flex-shrink:0}

    .toast{position:fixed;bottom:90px;left:20px;right:20px;background:#0d1b3e;
      color:#fbbf24;padding:14px 20px;border-radius:12px;font-size:14px;
      font-weight:bold;text-align:center;z-index:500;display:none;
      box-shadow:0 4px 20px rgba(0,0,0,.3)}
    .toast.show{display:block}

    .infobox{border-radius:8px;padding:10px 12px;font-size:12px;margin-bottom:10px}
    .ib-yellow{background:#fef3c7;border:1px solid #fde68a;color:#d97706}
    .ib-blue{background:#dbeafe;border:1px solid #93c5fd;color:#1a56db}
    .ib-red{background:#fee2e2;border:1px solid #fecaca;color:#dc2626}
    .ib-green{background:#dcfce7;border:1px solid #86efac;color:#15803d}

    .profile-header{background:linear-gradient(135deg,#0d1b3e,#1a3066);
      padding:24px 20px;display:flex;align-items:center;gap:16px;color:white}
    .list-item{display:flex;justify-content:space-between;align-items:center;
      padding:12px 0;border-bottom:1px solid #f8fafc;cursor:pointer}
    .list-item:last-child{border-bottom:none}
    .li-label{font-size:14px;color:#0d1b3e}
    .li-value{font-size:13px;color:#64748b;max-width:55%;text-align:right}
    .li-arrow{color:#94a3b8;font-size:16px;margin-left:6px}

    .hist-card{background:white;border-radius:12px;padding:14px;
      margin-bottom:10px;border:1px solid #d0d7ea}
    .hist-card.urgent{border-color:#f97316;box-shadow:0 0 0 3px #fed7aa}
    .hist-top{display:flex;justify-content:space-between;margin-bottom:6px;align-items:center}
    .hist-ref{font-size:12px;font-weight:700;color:#1a56db}
    .hist-route{font-size:13px;font-weight:600;color:#0d1b3e;margin-bottom:4px}
    .hist-detail{font-size:11px;color:#64748b;margin-bottom:8px}
    .hist-footer{display:flex;justify-content:space-between;align-items:center}
    .hist-fare{font-size:14px;font-weight:bold;color:#0d1b3e}
    .hist-vat{font-size:10px;color:#94a3b8;margin-top:1px}

    .tabbar{display:flex;background:white;border-bottom:1px solid #d0d7ea;padding:0 16px}
    .tab{flex:1;padding:13px 8px;text-align:center;font-size:13px;font-weight:500;
      color:#64748b;cursor:pointer;border-bottom:2.5px solid transparent;
      user-select:none;-webkit-tap-highlight-color:transparent}
    .tab.active{color:#0d1b3e;font-weight:700;border-bottom-color:#0d1b3e}

    .login-gate{background:linear-gradient(135deg,#0d1b3e,#1a3066);
      border-radius:12px;padding:24px;text-align:center;margin-bottom:14px;color:white}
    .gate-icon{font-size:36px;margin-bottom:8px}
    .gate-title{font-size:16px;font-weight:bold;margin-bottom:4px}
    .gate-sub{font-size:13px;color:#6b82b8;margin-bottom:16px}

    #sWelcome{background:#0d1b3e;align-items:center;justify-content:center;padding:30px 24px}
    .welcome-btn{width:100%;max-width:400px;padding:22px 20px;border-radius:14px;
      font-size:17px;font-weight:700;border:none;cursor:pointer;margin-bottom:16px;
      text-align:left;display:flex;align-items:center;gap:16px}
    .welcome-btn-now{background:white;color:#0d1b3e}
    .welcome-btn-pre{background:#1a2f5e;color:white;border:2px solid #2a4080}
    .welcome-btn-icon{font-size:28px;flex-shrink:0}
    .wbt-title{font-size:17px;font-weight:800}
    .wbt-sub{font-size:12px;opacity:.7;margin-top:2px}
    .welcome-lang{display:flex;gap:10px;margin-top:24px}
    .lang-btn{background:#1a2f5e;border:1px solid #2a4080;color:#94a3b8;
      padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:600}
    .lang-btn.active{background:#fbbf24;color:#0d1b3e;border-color:#fbbf24}
  </style>
</head>
<body>

<!-- LOADING -->
<div class="screen active" id="sLoad">
  <div class="load-logo">▲</div>
  <div class="load-name">WAYGO</div>
  <div class="load-sub" id="loadSub">Din taxi, direkt</div>
  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<!-- WELCOME -->
<div class="screen" id="sWelcome">
  <div style="text-align:center;margin-bottom:24px">
    <div style="font-size:56px;color:#fbbf24">▲</div>
    <div style="font-size:28px;font-weight:bold;color:#fbbf24;letter-spacing:3px">WAYGO</div>
    <div style="color:#4a6090;font-size:13px;margin-top:4px" id="welcomeSub">Sveriges snabbaste taxi</div>
  </div>
  <button class="welcome-btn welcome-btn-now" onclick="startBooking('now')">
    <div class="welcome-btn-icon">🚖</div>
    <div>
      <div class="wbt-title" id="wbNowTitle">Jag behöver en bil nu</div>
      <div class="wbt-sub" id="wbNowSub">Förare skickas direkt</div>
    </div>
    <div style="margin-left:auto;font-size:20px;color:#94a3b8">›</div>
  </button>
  <button class="welcome-btn welcome-btn-pre" onclick="startBooking('pre')">
    <div class="welcome-btn-icon">📅</div>
    <div>
      <div class="wbt-title" id="wbPreTitle">Jag vill förboka</div>
      <div class="wbt-sub" id="wbPreSub">Välj datum och tid</div>
    </div>
    <div style="margin-left:auto;font-size:20px;color:#6b82b8">›</div>
  </button>
  <div class="welcome-lang">
    <button class="lang-btn active" id="langSV" onclick="setLang('sv')">🇸🇪 Svenska</button>
    <button class="lang-btn" id="langEN" onclick="setLang('en')">🇬🇧 English</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="screen" id="sApp">
  <div class="topbar">
    <div class="tlogo" onclick="goWelcome()">▲ WAYGO</div>
    <div class="topbar-right">
      <button class="tlang" onclick="toggleLang()" id="langToggle">🇬🇧</button>
      <button class="tauth" id="topAuthBtn" onclick="topAuthAction()">Logga in</button>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto" id="tabContent"></div>
  <div class="bnav">
    <button class="bni active" id="bni0" onclick="showTab(0)">
      <span class="bni-icon">🚖</span><span id="nav0">Boka</span>
    </button>
    <button class="bni" id="bni1" onclick="showTab(1)">
      <span class="bni-icon">📋</span><span id="nav1">Resor</span>
    </button>
    <button class="bni" id="bni2" onclick="showTab(2)">
      <span class="bni-icon">👤</span><span id="nav2">Profil</span>
    </button>
    <button class="bni" id="bni3" onclick="showTab(3)">
      <span class="bni-icon">💳</span><span id="nav3">Betalning</span>
    </button>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="moverlay" id="authModal">
  <div class="mbox">
    <div id="pendingBookingSummary" style="display:none">
      <div class="infobox ib-blue" id="pendingInfo"></div>
    </div>
    <div class="auth-toggle">
      <button class="at-btn active" id="atLogin" onclick="switchAuth('login')">Logga in</button>
      <button class="at-btn" id="atReg" onclick="switchAuth('register')">Ny kund</button>
    </div>
    <div id="authLoginForm">
      <div class="mtitle" id="loginTitle">Välkommen tillbaka</div>
      <label class="flabel">E-postadress</label>
      <input class="finput" id="loginEmail" type="email" placeholder="din@email.se"/>
      <label class="flabel">Lösenord</label>
      <input class="finput" id="loginPassword" type="password" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')doLogin()"/>
      <div class="infobox ib-red" id="loginErr" style="display:none"></div>
      <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Logga in →</button>
      <div style="text-align:center;margin-top:12px;font-size:12px;color:#94a3b8">
        BankID &amp; SMS-kod kommer snart
      </div>
    </div>
    <div id="authRegForm" style="display:none">
      <div class="mtitle">Skapa konto</div>
      <div class="type-toggle">
        <button class="at-btn active" id="tPrivate" onclick="switchType('private')">👤 Privat</button>
        <button class="at-btn" id="tBusiness" onclick="switchType('business')">🏢 Företag</button>
      </div>
      <label class="flabel">Fullständigt namn *</label>
      <input class="finput" id="rName" type="text" placeholder="För- och efternamn"/>
      <label class="flabel">Telefon *</label>
      <input class="finput" id="rPhone" type="tel" placeholder="070-000 00 00"/>
      <label class="flabel">E-post *</label>
      <input class="finput" id="rEmail" type="email" placeholder="din@email.se"/>
      <label class="flabel">Lösenord * (minst 6 tecken)</label>
      <input class="finput" id="rPassword" type="password" placeholder="••••••••"/>
      <div id="bizFields" style="display:none">
        <label class="flabel">Organisationsnummer</label>
        <input class="finput" id="rOrgNr" type="text" placeholder="556xxx-xxxx"/>
        <label class="flabel">Faktureringsadress</label>
        <input class="finput" id="rBilling" type="text" placeholder="Gatuadress, stad"/>
      </div>
      <label class="flabel">Betalningsmetod</label>
      <select class="finput" id="rPayment">
        <option value="swish">📱 Swish</option>
        <option value="card">💳 Kort</option>
      </select>
      <div class="infobox ib-red" id="regErr" style="display:none"></div>
      <button class="btn btn-primary" id="regBtn" onclick="doRegister()">Skapa konto →</button>
    </div>
    <button class="btn btn-gray" style="margin-top:10px" onclick="closeMod('authModal')">Avbryt</button>
  </div>
</div>

<!-- SUPPORT MODAL -->
<div class="moverlay" id="supportModal" onclick="closeMIfOut(event,'supportModal')">
  <div class="mbox">
    <div class="mtitle">📞 Kundtjänst · Waygo</div>
    <div class="minfo" id="suppInfo"></div>
    <a href="tel:+46101234567" style="text-decoration:none;display:block;margin-bottom:12px">
      <button class="btn btn-success">📞 Ring kundtjänst direkt</button>
    </a>
    <div class="chatbox" id="suppChat"></div>
    <div class="cinput-row">
      <input class="cinput" id="suppInput" placeholder="Beskriv ditt problem..."
             onkeydown="if(event.key==='Enter')sendSupp()"/>
      <button class="csend" onclick="sendSupp()">➤</button>
    </div>
    <div class="infobox ib-yellow" style="margin-top:10px">
      ⚠️ Kontakta kundtjänst innan du avbokar en tilldelad resa.
    </div>
    <button class="btn btn-gray" style="margin-top:10px" onclick="closeMod('supportModal')">Stäng</button>
  </div>
</div>

<!-- CANCEL MODAL -->
<div class="moverlay" id="cancelModal" onclick="closeMIfOut(event,'cancelModal')">
  <div class="mbox">
    <div class="mtitle">Bekräfta avbokning</div>
    <div class="infobox ib-red" id="cancelWarn"></div>
    <div class="minfo" id="cancelInfo"></div>
    <div class="mbtns">
      <button class="mbtn" style="background:#f1f5f9;color:#64748b" onclick="closeMod('cancelModal')">Avbryt</button>
      <button class="mbtn" style="background:#dc2626;color:white" onclick="doCancel()">Avboka</button>
    </div>
  </div>
</div>

<!-- RATE MODAL -->
<div class="moverlay" id="rateModal" onclick="closeMIfOut(event,'rateModal')">
  <div class="mbox">
    <div class="mtitle">⭐ Betygsätt din resa</div>
    <div class="minfo" id="rateInfo"></div>
    <div class="stars" id="starRow">
      <span class="star" onclick="setStar(1)">★</span>
      <span class="star" onclick="setStar(2)">★</span>
      <span class="star" onclick="setStar(3)">★</span>
      <span class="star" onclick="setStar(4)">★</span>
      <span class="star" onclick="setStar(5)">★</span>
    </div>
    <button class="btn btn-primary" onclick="submitRating()">Skicka betyg</button>

  setLang(lang);
  setTimeout(() => {
    try {
      const saved = localStorage.getItem('waygo_customer');
      const savedToken = localStorage.getItem('waygo_token');
      const savedSupport = localStorage.getItem('waygo_support');
      if (savedSupport) {
        try { contactedSupport = JSON.parse(savedSupport); } catch(e){}
      }
      if (saved && savedToken) {
        customer = JSON.parse(saved);
        token = savedToken;
        selectedPay = customer.preferred_payment || 'swish';
        if (!isBusinessCustomer() && selectedPay==='invoice') selectedPay='swish';

        loadMyBookings();
        tryConnectSocket();
        showScreen('sApp');
        showTab(0);
      } else {
        showScreen('sWelcome');
      }
    } catch(e) {
      console.log('Init error:', e);
      showScreen('sWelcome');
    }

});

function showScreen(id) {

    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const el = document.getElementById(id);
    if (el) el.classList.add('active');
  } catch(e) { console.log('showScreen error:', e); }
}

function showToast(msg) {
  try {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
  } catch(e){}
}

function closeMod(id) {
  try {
    document.getElementById(id).classList.remove('open');
  } catch(e){}
}

function closeMIfOut(e, id) {
  if (e.target === document.getElementById(id)) closeMod(id);
}

    tomorrow.setDate(tomorrow.getDate()+1);
    preBookDate = tomorrow.toISOString().split('T')[0];
    preBookTime = '09:00';

      const el = document.getElementById(id);
      if (el) el.textContent = t(keys[i]);
    });

}

  if (customer) { showTab(2); return; }
  openAuthModal(null);

// ── PAYMENT LOGIC ──
function isBusinessCustomer() {
  return customer && customer.customer_type === 'business';
}

function getPaymentOptions() {
  const opts = [
    { id:'swish', label:t('swish') },
    { id:'card', label:t('card') },
  ];
  if (isBusinessCustomer()) opts.push({ id:'invoice', label:t('invoice') });
  return opts;
}

function renderPaymentGrid() {
  const opts = getPaymentOptions();
  const gridClass = opts.length===3 ? 'pgrid-3' : 'pgrid-2';
  if (!isBusinessCustomer() && selectedPay==='invoice') selectedPay='swish';
  let html = '<div class="pgrid ' + gridClass + '">';
  opts.forEach(o => {
    html += '<button class="pbtn ' + (selectedPay===o.id?'active':'') +
      '" onclick="selPay(\'' + o.id + '\')">' + o.label + '</button>';
  });
  html += '</div>';
  if (selectedPay==='invoice' && isBusinessCustomer()) {
    html += '<div class="infobox ib-yellow">' + t('invoice_biz') + '</div>';
  }
  return html;
}

function selPay(method) {
  if (method==='invoice' && !isBusinessCustomer()) {
    showToast(t('invoice_private')); return;
  }
  selectedPay = method;
  showTab(0);
}

// ── TABS ──
function showTab(i) {
  try {
    currentTab = i;
    document.querySelectorAll('.bni').forEach((b,j) => b.classList.toggle('active', i===j));
    const content = document.getElementById('tabContent');
    if (!content) return;
    if (i===0) content.innerHTML = renderBookTab();
    else if (i===1) { content.innerHTML = renderHistoryTab(); loadMyBookings(); }
    else if (i===2) content.innerHTML = renderProfileTab();
    else if (i===3) content.innerHTML = renderPaymentTab();
    updateTopbar();
  } catch(e) { console.log('showTab error:', e); }
}

// ── BOOK TAB ──
function renderBookTab() {
  const homeAddr = customer?.home_address || '';
  const workAddr = customer?.work_address || '';
  const isPreBook = bookingMode==='pre';
  const today = new Date().toISOString().split('T')[0];
  const maxDate = new Date();
  maxDate.setDate(maxDate.getDate()+30);
  const maxDateStr = maxDate.toISOString().split('T')[0];

  return `
    <div style="background:linear-gradient(135deg,#0d1b3e,#1a3066);padding:20px 20px 24px;color:white">
      <div style="font-size:20px;font-weight:bold;margin-bottom:4px">${t('book_title')}</div>
      <div style="color:#6b82b8;font-size:13px">${t('book_sub')}</div>
    </div>
    <div class="page">
      <div class="card">
        ${isPreBook ? `
        <div class="prebook-badge">
          <div class="prebook-badge-icon">📅</div>
          <div class="prebook-badge-text">${t('pre_booked_badge')}</div>
          <div class="prebook-badge-change" onclick="bookingMode='now';showTab(0)">${t('pre_change')} →</div>
        </div>
        <div class="dt-row">
          <div>
            <label class="flabel">${t('pre_date')}</label>
            <input class="finput" type="date" id="preDate"
              value="${preBookDate}" min="${today}" max="${maxDateStr}"
              onchange="preBookDate=this.value" style="margin-bottom:0"/>
          </div>
          <div>
            <label class="flabel">${t('pre_time')}</label>
            <input class="finput" type="time" id="preTime"
              value="${preBookTime}"
              onchange="preBookTime=this.value" style="margin-bottom:0"/>
          </div>
        </div>` : ''}

        <label class="flabel">📍 ${t('pickup')}</label>
        <input class="finput" id="bFrom" type="text"
               placeholder="${t('pickup')}..." value="${homeAddr}"/>

        <label class="flabel">🏁 ${t('destination')}</label>
        <input class="finput" id="bTo" type="text"
               placeholder="${t('destination')}?" onblur="calcFare()"/>

        ${customer && (homeAddr||workAddr) ? `
        <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
          ${homeAddr ? '<button class="btn btn-sm btn-gray" onclick="setAddr(\'bFrom\',\''+homeAddr+'\')">'+t('from_home')+'</button>' : ''}
          ${workAddr ? '<button class="btn btn-sm btn-gray" onclick="setAddr(\'bFrom\',\''+workAddr+'\')">'+t('from_work')+'</button>' : ''}
          ${homeAddr ? '<button class="btn btn-sm btn-gray" onclick="setAddr(\'bTo\',\''+homeAddr+'\')">'+t('to_home')+'</button>' : ''}
          ${workAddr ? '<button class="btn btn-sm btn-gray" onclick="setAddr(\'bTo\',\''+workAddr+'\')">'+t('to_work')+'</button>' : ''}
        </div>` : ''}

        <label class="flabel">💳 ${t('payment_method')}</label>
        ${renderPaymentGrid()}

        <div class="farebox">
          <div>
            <div style="font-size:13px;color:#64748b">${t('estimated_cost')}</div>
            <div style="font-size:11px;color:#94a3b8;margin-top:2px">${t('incl_vat')}</div>
          </div>
          <div class="fare-amt" id="fareAmt">150 kr</div>
        </div>

        ${!customer ? `
        <div class="infobox ib-blue" style="margin-bottom:14px">
          ℹ️ ${lang==='sv'?'Logga in för att slutföra bokningen.':'Log in to complete your booking.'}
        </div>` : ''}

        <button class="btn btn-primary" id="bookBtn" onclick="tryBook()">
          ${customer ? t('book_btn') : t('continue_btn')}
        </button>
      </div>
      <div class="bspace"></div>
    </div>`;
}

function setAddr(fieldId, addr) {
  const el = document.getElementById(fieldId);
  if (el) el.value = addr;
}

function calcFare() {
  const to = document.getElementById('bTo')?.value;
  const from = document.getElementById('bFrom')?.value;
  if (from && to) {
    const fare = Math.floor(Math.random()*300)+100;
    const el = document.getElementById('fareAmt');
    if (el) el.textContent = fare + ' kr';
  }
}

function tryBook() {
  const from = document.getElementById('bFrom')?.value.trim();
  const to = document.getElementById('bTo')?.value.trim();
  if (!from || !to) { showToast(t('fill_fields')); return; }
  if (bookingMode==='pre' && (!preBookDate||!preBookTime)) {
    showToast(t('fill_datetime')); return;
  }
  const fareText = document.getElementById('fareAmt')?.textContent || '150 kr';
  const fare = parseInt(fareText) || 150;
  if (!customer) {
    openAuthModal({
      from, to, pay: selectedPay, fare,
      payLabel: selectedPay==='swish'?t('swish'):selectedPay==='card'?t('card'):t('invoice'),
      mode: bookingMode, date: preBookDate, time: preBookTime
    });
    return;
  }
  if (selectedPay==='invoice' && !isBusinessCustomer()) {
    showToast(t('invoice_private')); selectedPay='swish'; showTab(0); return;
  }
  doBook(from, to, fare);
}

async function doBook(from, to, fare) {
  const btn = document.getElementById('bookBtn');
  if (btn) { btn.textContent='...'; btn.disabled=true; }
  try {
    const body = {
      customer_name: customer.name,
      customer_phone: customer.phone,
      from_address: from,
      to_address: to,
      payment_method: selectedPay,
      fare_sek: fare
    };
    if (bookingMode==='pre' && preBookDate && preBookTime) {
      body.scheduled_at = preBookDate + 'T' + preBookTime + ':00';
      body.booking_type = 'pre';
    }
    const res = await fetch(API+'/bookings', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.booking) {
      myBookings.unshift(data.booking);
      saveBookings();
      bookingMode='now';
      showToast(t('booked')+' '+data.booking.booking_ref);
      showTab(1);
    }
  } catch(err) { showToast(t('booking_failed')); }
  if (btn) { btn.textContent=t('book_btn'); btn.disabled=false; }
}

function openAuthModal(pendingData) {
  pendingBooking = pendingData;
  const summary = document.getElementById('pendingBookingSummary');
  const info = document.getElementById('pendingInfo');
  if (pendingData) {
    summary.style.display='';
    const dateStr = pendingData.mode==='pre'&&pendingData.date
      ? '<br>📅 '+pendingData.date+' kl. '+pendingData.time : '';
    info.innerHTML = '<strong>'+t('pending_booking_title')+'</strong><br>'+
      '📍 '+pendingData.from+' → 🏁 '+pendingData.to+'<br>'+
      '💳 '+pendingData.payLabel+' · '+pendingData.fare+' kr'+dateStr+'<br>'+
      '<strong>'+t('pending_complete')+'</strong>';
  } else { summary.style.display='none'; }
  document.getElementById('atLogin').textContent = t('login');
  document.getElementById('atReg').textContent = t('register');
  document.getElementById('loginBtn').textContent = t('login_btn');
  document.getElementById('regBtn').textContent = t('reg_btn');
  switchAuth('login');
  document.getElementById('authModal').classList.add('open');
}

function switchAuth(mode) {
  document.getElementById('authLoginForm').style.display = mode==='login'?'':'none';
  document.getElementById('authRegForm').style.display = mode==='register'?'':'none';
  document.getElementById('atLogin').classList.toggle('active', mode==='login');
  document.getElementById('atReg').classList.toggle('active', mode==='register');
}

function switchType(type) {
  customerType = type;
  document.getElementById('tPrivate').classList.toggle('active', type==='private');
  document.getElementById('tBusiness').classList.toggle('active', type==='business');
  document.getElementById('bizFields').style.display = type==='business'?'':'none';
  const sel = document.getElementById('rPayment');
  if (sel) {
    sel.innerHTML = '<option value="swish">'+t('swish')+'</option>'+
      '<option value="card">'+t('card')+'</option>'+
      (type==='business'?'<option value="invoice">'+t('invoice')+'</option>':'');
  }
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  const errEl = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  errEl.style.display='none';
  if (!email||!password) { errEl.textContent='⚠️ '+t('fill_required'); errEl.style.display=''; return; }
  btn.textContent=t('logging_in'); btn.disabled=true;
  try {
    const res = await fetch(API+'/customers/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if (data.token) {
      customer=data.customer; token=data.token;
      localStorage.setItem('waygo_customer', JSON.stringify(customer));
      localStorage.setItem('waygo_token', token);
      closeMod('authModal');
      updateTopbar();
      selectedPay = customer.preferred_payment||'swish';
      if (!isBusinessCustomer()&&selectedPay==='invoice') selectedPay='swish';
      loadMyBookings(); tryConnectSocket();
      showToast(t('welcome_msg')+' '+customer.name.split(' ')[0]+'!');
      if (pendingBooking) await completePendingBooking();
      else showTab(0);
    } else {
      errEl.textContent='⚠️'+(data.error||t('server_error'));
      errEl.style.display='';
    }
  } catch(err) { errEl.textContent=t('server_error'); errEl.style.display=''; }
  btn.textContent=t('login_btn'); btn.disabled=false;
}

async function doRegister() {
  const name=document.getElementById('rName').value.trim();
  const phone=document.getElementById('rPhone').value.trim();
  const email=document.getElementById('rEmail').value.trim();
  const password=document.getElementById('rPassword').value.trim();
  const errEl=document.getElementById('regErr');
  const btn=document.getElementById('regBtn');
  errEl.style.display='none';
  if (!name||!phone||!email||!password) { errEl.textContent=t('fill_required'); errEl.style.display=''; return; }
  if (password.length<6) { errEl.textContent=t('pwd_short'); errEl.style.display=''; return; }
  btn.textContent=t('creating'); btn.disabled=true;
  try {
    const payVal=document.getElementById('rPayment').value;
    const finalPay=(payVal==='invoice'&&customerType!=='business')?'swish':payVal;
    const res=await fetch(API+'/customers/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name, phone, email, password,
        customer_type: customerType,
        preferred_payment: finalPay,
        org_number: document.getElementById('rOrgNr')?.value||null,
        billing_address: document.getElementById('rBilling')?.value||null,
      })
    });
    const data=await res.json();
    if (data.token) {
      customer=data.customer; token=data.token;
      localStorage.setItem('waygo_customer', JSON.stringify(customer));
      localStorage.setItem('waygo_token', token);
      closeMod('authModal'); updateTopbar();
      selectedPay=customer.preferred_payment||'swish';
      tryConnectSocket();
      showToast(t('account_created')+' '+customer.name.split(' ')[0]+'!');
      if (pendingBooking) await completePendingBooking();
      else showTab(0);
    } else {
      errEl.textContent='⚠️'+(data.error||t('server_error'));
      errEl.style.display='';
    }
  } catch(err) { errEl.textContent=t('server_error'); errEl.style.display=''; }
  btn.textContent=t('reg_btn'); btn.disabled=false;
}

async function completePendingBooking() {
  if (!pendingBooking||!customer) return;
  let payMethod=pendingBooking.pay;
  if (payMethod==='invoice'&&!isBusinessCustomer()) { payMethod='swish'; showToast(t('invoice_private')); }
  showToast(t('completing'));
  try {
    const body={
      customer_name:customer.name, customer_phone:customer.phone,
      from_address:pendingBooking.from, to_address:pendingBooking.to,
      payment_method:payMethod, fare_sek:pendingBooking.fare
    };
    if (pendingBooking.mode==='pre'&&pendingBooking.date) {
      body.scheduled_at=pendingBooking.date+'T'+pendingBooking.time+':00';
      body.booking_type='pre';
    }
    const res=await fetch(API+'/bookings', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const data=await res.json();
    if (data.booking) {
      myBookings.unshift(data.booking); saveBookings();
      pendingBooking=null; bookingMode='now';
      showToast(t('booked')+' '+data.booking.booking_ref);
      showTab(1);
    }
  } catch(err) { showToast(t('complete_fail')); showTab(0); }
}

function logout() {
  localStorage.removeItem('waygo_customer');
  localStorage.removeItem('waygo_token');
  localStorage.removeItem('waygo_bookings');
  customer=null; token=null; myBookings=[];
  updateTopbar();
  showToast(t('logged_out'));
  showScreen('sWelcome');
}

function renderHistoryTab() {
  if (!customer) return loginGate(t('login_gate_rides'));
  const active = myBookings.filter(b => ['pending','assigned'].includes(b.status));
  const past = myBookings.filter(b => ['cancelled','completed'].includes(b.status));
  return `
    <div class="tabbar" id="htabbar">
      <div class="tab active" id="htab0"
           onclick="switchHTab(0)">
        ${t('active')} (${active.length})
      </div>
      <div class="tab" id="htab1"
           onclick="switchHTab(1)">
        ${t('history')} (${past.length})
      </div>
    </div>
    <div id="histContent" class="page">
      ${renderActiveBookings(active)}
    </div>
    <div class="bspace"></div>`;
}

function switchHTab(i) {
  try {
    const tab0 = document.getElementById('htab0');
    const tab1 = document.getElementById('htab1');
    const content = document.getElementById('histContent');
    if (!tab0 || !tab1 || !content) return;

    if (i === 0) {
      tab0.classList.add('active');
      tab1.classList.remove('active');
      const active = myBookings.filter(b =>
        ['pending','assigned'].includes(b.status));
      content.innerHTML = renderActiveBookings(active);
    } else {
      tab1.classList.add('active');
      tab0.classList.remove('active');
      const past = myBookings.filter(b =>
        ['cancelled','completed'].includes(b.status));
      content.innerHTML = renderPastBookings(past);
    }
  } catch(e) {
    console.log('switchHTab error:', e);
  }
}

function getBadge(status) {
  const m = {
    assigned:'<span class="badge b-green">'+t('assigned')+'</span>',
    pending:'<span class="badge b-yellow">'+t('pending_driver')+'</span>',
    cancelled:'<span class="badge b-red">'+t('cancelled')+'</span>',
    completed:'<span class="badge b-gray">'+t('completed')+'</span>',
  };
  return m[status]||'<span class="badge b-gray">'+status+'</span>';
}

function minsAgo(ts) {
  if (!ts) return 0;
  return Math.floor((Date.now()-new Date(ts).getTime())/60000);
}

function renderActiveBookings(bookings) {
  if (bookings.length===0) return '<div style="text-align:center;padding:40px;color:#94a3b8;font-size:13px">'+t('no_active')+'</div>';
  return bookings.map(b => {
    const mins=minsAgo(b.assigned_at);
    const isLate=b.status==='assigned'&&mins>=10;
    const hasSupp=contactedSupport[b.id];
    const isPre=b.booking_type==='pre';
    let mapHtml='';
    if (b.status==='assigned'&&b.driver_name) {
      mapHtml=`<div class="mmap">
        <div class="mmap-bg"></div>
        <div class="mroad-h" style="top:35%"></div>
        <div class="mroad-h" style="top:65%"></div>
        <div class="mroad-v" style="left:30%"></div>
        <div class="mroad-v" style="left:65%"></div>
        <div class="dmarker" id="dm-${b.id}" style="left:30%;top:30%">🚖</div>
        <div class="cmarker" style="left:70%;top:65%">👤</div>
        <div class="meta">~${Math.max(1,12-mins)} min</div>
        <div class="mlive">🔴 Live</div>
      </div>`;
      setTimeout(()=>animateDriver(b.id),100);
    }
    let cancelBtn='';
    if (b.status==='pending') {
      cancelBtn='<button class="btn btn-sm btn-danger" onclick="openCancel('+b.id+',\''+b.booking_ref+'\',\'pending\')">'+t('cancel_ride')+'</button>';
    } else if (hasSupp) {
      cancelBtn='<button class="btn btn-sm btn-danger" onclick="openCancel('+b.id+',\''+b.booking_ref+'\',\'assigned\')">'+t('cancel_request')+'</button>';
    } else if (b.status==='assigned') {
      cancelBtn='<button class="btn btn-sm btn-teal" onclick="openSupp('+b.id+',\''+b.booking_ref+'\')">'+t('contact_support')+'</button>';
    }
    return `<div class="hist-card ${isLate?'urgent':''}">
      <div class="hist-top">
        <span class="hist-ref">${b.booking_ref}</span>
        <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
          ${isPre?'<span class="badge b-purple">'+t('prebook_label')+'</span>':''}
          ${getBadge(b.status)}
        </div>
      </div>
      ${isPre&&b.scheduled_at?'<div style="font-size:11px;color:#7c3aed;font-weight:700;margin-bottom:4px">📅 '+new Date(b.scheduled_at).toLocaleString(lang==='sv'?'sv-SE':'en-GB',{dateStyle:'medium',timeStyle:'short'})+'</div>':''}
      <div class="hist-route">📍 ${b.from_address} → 🏁 ${b.to_address}</div>
      <div class="hist-detail">${b.driver_name?'🚖 '+b.driver_name+' · ':t('looking_driver')+' · '}${b.fare_sek} kr · ${b.payment_method}</div>
      ${isLate?'<div class="infobox ib-red">⏱ '+t('driver_late')+' '+mins+' '+t('mins_late')+'</div>':''}
      ${mapHtml}
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">
        ${b.status==='assigned'?'<button class="btn btn-sm btn-primary" onclick="openSupp('+b.id+',\''+b.booking_ref+'\')">'+t('support')+'</button>':''}

function sendSupp() {
  const input=document.getElementById('suppInput');
  const text=input.value.trim();
  if (!text) return;
  const chat=document.getElementById('suppChat');
  chat.innerHTML+='<div class="cmsg mine"><div class="cav">Du</div><div class="cbubble">'+text+'</div></div>';
  input.value='';
  chat.scrollTop=chat.scrollHeight;
  setTimeout(()=>{
    chat.innerHTML+='<div class="cmsg other"><div class="cav sup">W</div><div class="cbubble">'+(lang==='sv'?'Tack! Vi återkommer inom 2 minuter.':'Thank you! We will get back to you within 2 minutes.')+'</div></div>';
    chat.scrollTop=chat.scrollHeight;
  },1500);
  fetch(API+'/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({thread_key:'customer-central-'+suppBookingId,
      sender_name:customer?.name||'Kund',sender_role:'customer',content:text})
  }).catch(()=>{});
}

      myBookings=myBookings.map(b=>b.id===cancelBookingId?{...b,status:'cancelled',driver_id:null,driver_name:null}:b);

async function saveEdit() {
  const val=document.getElementById('editInput').value.trim();
  closeMod('editModal');
  try {
    if (editField==='preferred_payment'&&val==='invoice'&&!isBusinessCustomer()) {
      showToast(t('invoice_private')); return;
    }
    const body={};
    body[editField]=val;
    const res=await fetch(API+'/customers/profile',{
      method:'PATCH',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify(body)
    });
    const data=await res.json();
    if (data.customer) {
      customer={...customer,...data.customer};
      localStorage.setItem('waygo_customer',JSON.stringify(customer));
      showToast(t('saved')); showTab(2);
    }
  } catch(err) { showToast(t('save_failed')); }
}

// ── DRIVER ANIMATION ──
function animateDriver(bookingId) {
  if (driverAnimations[bookingId]) return;
  let x=30; let y=30;
  driverAnimations[bookingId]=setInterval(()=>{
    x=Math.min(75,Math.max(15,x+(Math.random()-.4)*8));
    y=Math.min(75,Math.max(15,y+(Math.random()-.4)*8));
    const m=document.getElementById('dm-'+bookingId);
    if (m) { m.style.left=x+'%'; m.style.top=y+'%'; }
  },3000);
}

// ── DATA ──
async function loadMyBookings() {
  if (!customer) return;
  const saved=localStorage.getItem('waygo_bookings');
  if (saved) { try { myBookings=JSON.parse(saved); } catch(e){} }
  try {
    const res=await fetch(API+'/bookings');
    const data=await res.json();
    myBookings=myBookings.map(mb=>{
      const updated=data.bookings.find(b=>b.id===mb.id);
      return updated||mb;
    });
    saveBookings();
    if (currentTab===1) showTab(1);
    if (currentTab===3) showTab(3);
  } catch(err){}
}

function saveBookings() {
  localStorage.setItem('waygo_bookings',JSON.stringify(myBookings));
}

// ── SOCKET — with fallback ──
function tryConnectSocket() {
  try {
    if (typeof io === 'undefined') return;
    const socket = io(API, { timeout: 5000 });
    socket.on('booking:assigned', b => {
      myBookings=myBookings.map(mb=>mb.id===b.id?{...mb,...b}:mb);
      saveBookings();
      if (b.driver_name) showToast(t('driver_assigned')+' '+b.driver_name);
      if (currentTab===1) showTab(1);
    });
    socket.on('booking:cancelled', d => {
      myBookings=myBookings.map(b=>b.id===d.id?{...b,status:'cancelled'}:b);
      saveBookings();
      if (currentTab===1) showTab(1);
    });
  } catch(e) { console.log('Socket not available'); }
}

setInterval(loadMyBookings, 30000);
</script>

<!-- Load socket.io async so it does not block the app -->
<script async src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
